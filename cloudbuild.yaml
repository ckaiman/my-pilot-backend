steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_GCR_HOSTNAME/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID', '.']

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_GCR_HOSTNAME/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID']

  # 3. Run migrations (Optional: only if using a persistent DB like Cloud SQL)
  # For now, let's add it to the deploy command or as a separate step if we have a DB connection
  
  # 4. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_GCR_HOSTNAME/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Define substitution variables for easy overrides
substitutions:
  _SERVICE_NAME: my-pilot-backend
  _DEPLOY_REGION: us-central1
  _GCR_HOSTNAME: gcr.io

images:
  - '$_GCR_HOSTNAME/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
